<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <section class="logo-box" aria-label="Logo DevSorteio">
            <img src="assets/dado-verde.png" alt="Dado verde" class="logo-dice">
            <h1 class="logo-title">Sorteador</h1>
        </section>

        <section class="draw-card" aria-label="Sorteio de n\u00famero">
            <p class="draw-label">Sortear um número aleatório entre:</p>

            <div class="range-inputs">
                <label class="input-min" for="min">Valor inicial</label>
                <input id="min" type="number" placeholder="valor mínimo" inputmode="numeric">

                <label class="input-max" for="max">Valor final</label>
                <input id="max" type="number" placeholder="valor máximo" inputmode="numeric">
            </div>

            <div class="no-repeat-option">
                <input id="no-repeat" type="checkbox">
                <label for="no-repeat">Não repetir números</label>
            </div>

            <button onclick="generateNumber()" class="draw-button" type="button">Sortear</button>
            <p class="result-label">Resultado</p>
            <output id="result-box" class="result-box" aria-live="polite">-</output>
                    <div id="results-history-container">
                        <p class="history-label">Resultados sorteados</p>
                        <output id="results-history" class="results-history"></output>
                        <button id="clear-history" class="clear-history" type="button">Limpar resultados</button>
                    </div>
        </section>
    </main>
</body>
<script src="script.js"></script>
</html>
